<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>7초 맞추기 게임</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #app {
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 2px 24px rgba(0,0,0,0.07);
    }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 2rem; }
    .timer-display {
      font-size: 60px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      font-family: 'Courier New', monospace;
      letter-spacing: -2px;
      margin-bottom: 1.25rem;
      color: #1a1a1a;
    }

    /* 경품 박스 */
    .prize-box {
      border-radius: 14px;
      padding: 1rem;
      margin-bottom: 1rem;
      min-height: 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      border: 2px solid transparent;
    }
    .prize-box.rank1 { background: #fffbe6; border-color: #f5c518; }
    .prize-box.rank2 { background: #f0f7ff; border-color: #5b9cf6; }
    .prize-box.rank3 { background: #f3fff6; border-color: #3ecf6e; }
    .prize-box.hidden-box { background: #f7f6f3; border-color: #eee; }

    .prize-rank { font-size: 13px; font-weight: 700; letter-spacing: .04em; }
    .rank1 .prize-rank { color: #c89b00; }
    .rank2 .prize-rank { color: #2563eb; }
    .rank3 .prize-rank { color: #16a34a; }

    .prize-name { font-size: 20px; font-weight: 700; color: #1a1a1a; }
    .prize-sub  { font-size: 12px; color: #aaa; margin-top: 2px; }

    .btn-wrap { margin-bottom: 1.25rem; }
    #mainBtn {
      width: 130px; height: 130px;
      border-radius: 50%;
      border: 2px solid #ccc;
      background: #fff;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    #mainBtn:hover { background: #f0f0ee; }
    #mainBtn:active { transform: scale(0.97); }
    #mainBtn.active { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; }
    #mainBtn.rank1  { border-color: #f5c518; background: #fffbe6; color: #c89b00; }
    #mainBtn.rank2  { border-color: #5b9cf6; background: #f0f7ff; color: #2563eb; }
    #mainBtn.rank3  { border-color: #3ecf6e; background: #f3fff6; color: #16a34a; }

    .hint { font-size: 13px; color: #aaa; margin-bottom: 1.5rem; min-height: 20px; }

    /* 기준표 */
    .table-title { font-size: 12px; font-weight: 600; color: #ccc; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 8px; }
    .rank-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 1.5rem; }
    .rank-table th { color: #aaa; font-weight: 500; padding: 5px 8px; border-bottom: 1px solid #f0f0ee; text-align: center; }
    .rank-table td { padding: 8px; border-bottom: 1px solid #f5f5f3; text-align: center; color: #1a1a1a; }
    .rank-table tr:last-child td { border-bottom: none; }
    .rtag { display: inline-block; padding: 2px 10px; border-radius: 20px; font-weight: 700; font-size: 12px; }
    .rtag.r1 { background: #fffbe6; color: #c89b00; }
    .rtag.r2 { background: #f0f7ff; color: #2563eb; }
    .rtag.r3 { background: #f3fff6; color: #16a34a; }

    /* 기록 */
    .records-wrap { text-align: left; }
    .records-title { font-size: 14px; font-weight: 600; color: #666; margin-bottom: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { color: #888; font-weight: 500; padding: 6px 10px; border-bottom: 1px solid #eee; text-align: center; }
    td { padding: 9px 10px; border-bottom: 1px solid #f0f0f0; text-align: center; color: #1a1a1a; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; font-size: 11px; padding: 2px 9px; border-radius: 20px; font-weight: 600; }
    .badge.r1 { background: #fffbe6; color: #c89b00; }
    .badge.r2 { background: #f0f7ff; color: #2563eb; }
    .badge.r3 { background: #f3fff6; color: #16a34a; }
  </style>
</head>
<body>
<div id="app">
  <h1>7초 맞추기 게임</h1>
  <p class="subtitle">7.00초를 맞춰라!</p>

  <div class="timer-display" id="timerDisplay">00:00</div>

  <!-- 경품 결과 박스 -->
  <div class="prize-box hidden-box" id="prizeBox">
    <div class="prize-name" style="color:#ccc">버튼을 눌러 시작하세요</div>
  </div>

  <div class="btn-wrap">
    <button id="mainBtn" onclick="handleBtn()">시작</button>
  </div>
  <p class="hint" id="hintText">버튼을 누르면 타이머가 시작됩니다</p>

  <!-- 등수 기준표 -->
  <p class="table-title">경품 기준</p>
  <table class="rank-table">
    <thead><tr><th>등수</th><th>조건</th><th>경품</th></tr></thead>
    <tbody>
      <tr><td><span class="rtag r1">🥇 1등</span></td><td>정확히 7.00초</td><td style="font-weight:600">1등 경품</td></tr>
      <tr><td><span class="rtag r2">🥈 2등</span></td><td>6.90 ~ 7.10초</td><td style="font-weight:600">2등 경품</td></tr>
      <tr><td><span class="rtag r3">🥉 3등</span></td><td>그 외</td><td style="font-weight:600">3등 경품</td></tr>
    </tbody>
  </table>

  <div class="records-wrap" id="recordsWrap" style="display:none;">
    <p class="records-title">기록</p>
    <table>
      <thead>
        <tr><th>시도</th><th>시간 (초)</th><th>오차 (초)</th><th>결과</th></tr>
      </thead>
      <tbody id="recordsBody"></tbody>
    </table>
  </div>
</div>

<script>
const TARGET = 7.0;

// 등수 판정
function getGrade(elapsed) {
  const diff = Math.abs(elapsed - TARGET);
  if (elapsed === TARGET || diff === 0 || elapsed.toFixed(2) === '7.00')
    return 'r1';
  if (elapsed >= 6.90 && elapsed <= 7.10)
    return 'r2';
  return 'r3';
}

const GRADE_INFO = {
  r1: { rank: '🥇 1등', prize: '1등 경품', cls: 'rank1', btnCls: 'rank1', label: '1등 경품' },
  r2: { rank: '🥈 2등', prize: '2등 경품', cls: 'rank2', btnCls: 'rank2', label: '2등 경품' },
  r3: { rank: '🥉 3등', prize: '3등 경품', cls: 'rank3', btnCls: 'rank3', label: '3등 경품' },
};

let running = false;
let startTime = null;
let rafId = null;
let records = [];

const timerDisplay = document.getElementById('timerDisplay');
const prizeBox     = document.getElementById('prizeBox');
const mainBtn      = document.getElementById('mainBtn');
const hintText     = document.getElementById('hintText');
const recordsWrap  = document.getElementById('recordsWrap');
const recordsBody  = document.getElementById('recordsBody');

function fmt(ms) {
  const s  = Math.floor(ms / 1000);
  const cs = Math.floor((ms % 1000) / 10);
  return String(s).padStart(2,'0') + ':' + String(cs).padStart(2,'0');
}

function tick() {
  if (!running) return;
  timerDisplay.textContent = fmt(Date.now() - startTime);
  rafId = requestAnimationFrame(tick);
}

function handleBtn() {
  if (!running) {
    running   = true;
    startTime = Date.now();
    mainBtn.textContent = '정지';
    mainBtn.className   = 'active';
    prizeBox.className  = 'prize-box hidden-box';
    prizeBox.innerHTML  = '<div class="prize-name" style="color:#ccc">7.00초에 멈추세요!</div>';
    hintText.textContent = '7.00초가 되면 버튼을 누르세요!';
    rafId = requestAnimationFrame(tick);
  } else {
    running = false;
    cancelAnimationFrame(rafId);

    const elapsed    = (Date.now() - startTime) / 1000;
    const diff       = Math.abs(elapsed - TARGET);
    const elapsedFmt = elapsed.toFixed(2);
    const diffFmt    = diff.toFixed(2);
    const grade      = getGrade(parseFloat(elapsedFmt));
    const info       = GRADE_INFO[grade];

    // 경품 박스 업데이트
    prizeBox.className = 'prize-box ' + info.cls;
    prizeBox.innerHTML = `
      <div class="prize-rank">${info.rank}</div>
      <div class="prize-name">${info.prize}</div>
      <div class="prize-sub">${elapsedFmt}초 · 오차 ${diffFmt}초</div>
    `;

    mainBtn.textContent = '다시';
    mainBtn.className   = info.btnCls;
    hintText.textContent = `측정 시간: ${elapsedFmt}초 / 오차: ${diffFmt}초`;
    timerDisplay.textContent = fmt(Math.round(elapsed * 1000));

    records.push({ attempt: records.length + 1, elapsed: elapsedFmt, diff: diffFmt, grade, label: info.rank });
    renderRecords();
  }
}

function renderRecords() {
  recordsWrap.style.display = 'block';
  recordsBody.innerHTML = records.map(r =>
    `<tr>
      <td>${r.attempt}</td>
      <td>${r.elapsed}</td>
      <td>${r.diff}</td>
      <td><span class="badge ${r.grade}">${r.label}</span></td>
    </tr>`
  ).join('');
}
</script>
</body>
</html>
